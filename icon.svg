<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#2e1608"/>
      <stop offset="100%" stop-color="#0e0804"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="52%" r="42%">
      <stop offset="0%" stop-color="#8030c8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0e0804" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gs" cx="30%" cy="25%" r="52%">
      <stop offset="0%" stop-color="#d090f0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#5a18a0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gd" cx="30%" cy="25%" r="52%">
      <stop offset="0%" stop-color="#b878e8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#4a1290" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect width="512" height="512" rx="96" fill="url(#glow)"/>

  <!-- stem -->
  <path d="M256 116 Q268 88 288 72" stroke="#7a5518" stroke-width="11" fill="none" stroke-linecap="round"/>
  <!-- leaf -->
  <path d="M288 72 Q334 50 328 94 Q306 100 288 72Z" fill="#2a8020" opacity="0.95"/>

  <!-- row 1: 3 grapes -->
  <circle cx="188" cy="186" r="54" fill="#7a26b6"/>
  <circle cx="188" cy="186" r="54" fill="url(#gs)"/>
  <circle cx="256" cy="186" r="54" fill="#7a26b6"/>
  <circle cx="256" cy="186" r="54" fill="url(#gs)"/>
  <circle cx="324" cy="186" r="54" fill="#7a26b6"/>
  <circle cx="324" cy="186" r="54" fill="url(#gs)"/>

  <!-- row 2: 2 grapes -->
  <circle cx="222" cy="260" r="54" fill="#7a26b6"/>
  <circle cx="222" cy="260" r="54" fill="url(#gd)"/>
  <circle cx="290" cy="260" r="54" fill="#7a26b6"/>
  <circle cx="290" cy="260" r="54" fill="url(#gd)"/>

  <!-- row 3: 1 grape (tip) -->
  <circle cx="256" cy="334" r="54" fill="#6e1ea8"/>
  <circle cx="256" cy="334" r="54" fill="url(#gd)"/>

  <!-- gold border -->
  <rect x="3" y="3" width="506" height="506" rx="94" fill="none" stroke="#c79b42" stroke-width="5" opacity="0.30"/>
</svg>
